<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF8F5;--surface:#fff;--surface2:#F4F1ED;
  --text:#1A1410;--text2:#6B6158;--text3:#A89F96;

  --amber-bg:#FAEEDA;--amber-text:#854F0B;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:4rem}

/* HERO */
.hero{background:var(--text);color:#fff;padding:3rem 1.5rem 2.5rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,0.02) 40px,rgba(255,255,255,0.02) 80px)}
.hero-eye{font-size:10px;letter-spacing:.15em;color:rgba(255,255,255,.45);margin-bottom:.75rem;text-transform:uppercase;position:relative}
.hero-title{font-family:'Noto Serif JP',serif;font-size:clamp(1.5rem,4vw,2.2rem);font-weight:600;line-height:1.4;position:relative}
.hero-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:.6rem;line-height:1.7;position:relative}

.wrapper{max-width:720px;margin:0 auto;padding:0 1.25rem}

/* MAIN FEATURE TABS */
.feature-tabs{display:flex;gap:0;margin-top:1.75rem;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.feature-tab{flex:1;padding:14px 8px;text-align:center;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--text3);border-right:1px solid var(--border);transition:all .15s;line-height:1.4}
.feature-tab:last-child{border-right:none}
.feature-tab .tab-icon{font-size:18px;display:block;margin-bottom:4px}
.feature-tab.active{background:var(--text);color:#fff}
.feature-tab:not(.active):hover{background:var(--surface2);color:var(--text2)}

/* CATEGORY TABS */
.section{margin-top:1.5rem}
.section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:.6rem;padding-left:2px}
.cat-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1rem}
.cat-tab{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);transition:all .15s;font-weight:500}
.cat-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.cat-tab:not(.active):hover{color:var(--text);border-color:var(--border2)}

/* TYPE TABS */
.type-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.type-tab{padding:5px 13px;border-radius:20px;font-size:11.5px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s}
.type-tab.active{background:var(--purple-bg);color:var(--purple-text);border-color:#AFA9EC;font-weight:700}
.type-tab:not(.active):hover{border-color:var(--border2)}

/* CONTENT CARD */
.content-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-header{padding:1.1rem 1.4rem 1rem;border-bottom:1px solid var(--border)}
.card-type-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;background:var(--purple-bg);color:var(--purple-text);margin-bottom:7px;letter-spacing:.04em}
.card-title{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:600;line-height:1.45;margin-bottom:6px}
.card-essence{font-size:12px;color:var(--text2);line-height:1.7;padding:9px 12px;background:var(--surface2);border-radius:8px}
.card-essence strong{color:var(--text);font-weight:700}

.card-body{padding:1rem 1.4rem 1.2rem;display:flex;flex-direction:column;gap:10px}

/* ITEMS */
.item-block{border-radius:10px;padding:11px 13px}
.item-block.green{background:var(--green-bg);border-left:3px solid var(--green)}
.item-block.purple{background:var(--purple-bg);border-left:3px solid var(--purple)}
.item-block.red{background:var(--red-bg);border-left:3px solid var(--red)}
.item-block.amber{background:var(--amber-bg);border-left:3px solid #BA7517}
.item-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.item-block.green .item-label{color:var(--green-text)}
.item-block.purple .item-label{color:var(--purple-text)}
.item-block.red .item-label{color:var(--red-text)}
.item-block.amber .item-label{color:#854F0B}

.item-row{padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.06);font-size:13px;line-height:1.65}
.item-row:last-child{border-bottom:none;padding-bottom:0}
.item-main{display:flex;gap:6px;align-items:flex-start;font-weight:500}
.item-icon{flex-shrink:0;margin-top:1px}
.item-reason{font-size:12px;color:var(--text2);margin-top:3px;padding-left:16px;line-height:1.6}

.tip-box strong{color:var(--text);font-weight:700}

.footer{margin-top:3.5rem;text-align:center;font-size:11px;color:var(--text3);padding:1.75rem 1.25rem;border-top:1px solid var(--border)}

@media(max-width:480px){
  .feature-tab{font-size:11px;padding:12px 4px}
  .feature-tab .tab-icon{font-size:16px}
}
</style>

// ============================================================
// STATE & RENDER
// ============================================================
let currentFeature = 'home';
let currentCat = 'busy';
let currentType = 'busyA';

function selectFeature(f, el) {
  currentFeature = f;
  document.querySelectorAll('.feature-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentCat = cats[0].id;
  currentType = types[cats[0].id][0].id;
  renderCats();
  renderTypes();
  renderContent();
}

function selectCat(cid, el) {
  currentCat = cid;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentType = types[cid][0].id;
  renderTypes();
  renderContent();
}

function selectType(tid, el) {
  currentType = tid;
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderContent();
}

function renderCats() {
  document.getElementById('catTabs').innerHTML = cats.map((c,i) =>
    `<div class="cat-tab${c.id===currentCat?' active':''}" onclick="selectCat('${c.id}',this)">${c.label}</div>`
  ).join('');
}

function renderTypes() {
  document.getElementById('typeTabs').innerHTML = types[currentCat].map(t =>
    `<div class="type-tab${t.id===currentType?' active':''}" onclick="selectType('${t.id}',this)">${t.label}</div>`
  ).join('');
}

function renderContent() {
  const card = document.getElementById('contentCard');
  if (currentFeature === 'home') renderHome(card);
  else if (currentFeature === 'rely') renderRely(card);
  else renderCool(card);
}

function renderHome(card) {
  const d = homeData[currentType];
  card.innerHTML = `
    <div class="card-header">
      <div class="card-type-badge">${d.badge}</div>
      <div class="card-title">${d.title}</div>
      <div class="card-essence">本質：<strong>${d.essence}</strong></div>
    </div>
    <div class="card-body">
      <div class="item-block green">
        <div class="item-label">効果的な褒め言葉 ＆ 理由</div>
        ${d.items.map(item=>`
          <div class="item-row">
            <div class="item-main"><span class="item-icon" style="color:var(--green)">✦</span>${item.phrase}</div>
            ${item.reason ? `<div class="item-reason">→ ${item.reason}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderRely(card) {
  const d = relyData[currentType];

    <div class="card-header">

    <div class="card-body">
